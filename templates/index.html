<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Методи сортування</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header>
        <h1>Візуалізація алгоритмів сортування</h1>
    </header>

    <main>
        <section class="input-section">
            <label for="numbersInput">Введіть числа через кому:</label>
            <input type="text" id="numbersInput" placeholder="Наприклад: 42, 12, 8, 3, 25">
            
            <div class="button-group">
                <button onclick="sendToPython('bubble')" class="btn-sort">Бульбашка (Bubble Sort)</button>
                <button onclick="sendToPython('quick')" class="btn-sort">Швидке (Quick Sort)</button>
            </div>
        </section>

        <section id="resultBox" class="result-container" style="display: none;">
            <h2>Результат сортування:</h2>
            <p><strong>Метод:</strong> <span id="methodName"></span></p>
            <div class="array-display" id="sortedResult"></div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Лабораторна робота з алгоритмів</p>
    </footer>

    <<script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
